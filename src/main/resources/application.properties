spring.application.name=journalApp

################### MongoDB ###################

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=journaldb
spring.data.mongodb.auto-index-creation=true

################### Weather API ###################

weather.api.key=${WEATHER_API_KEY}

################### Mail ###################

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

################### Redis ###################

spring.redis.url=${REDIS_URL}

################### Kafka ###################

spring.kafka.properties.sasl.mechanism=PLAIN

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=weekly-sentiment-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.pc.journalApp.model

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.properties.sasl.jaas.config=${KAFKA_JAAS_CONFIG}
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.session.timeout.ms=45000

client.id=${KAFKA_CLIENT_ID}

################### Swagger ###################

springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tryItOutEnabled=true